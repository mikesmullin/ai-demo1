kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ai-gw-lab
nodes:
  - role: control-plane
    extraPortMappings:
      # Envoy AI Gateway
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # chat-front2-ui
      - containerPort: 30200
        hostPort: 30200
        protocol: TCP
      # oauth-idp
      - containerPort: 30300
        hostPort: 30300
        protocol: TCP
