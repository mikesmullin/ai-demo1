apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-front2-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-front2-ui
  template:
    metadata:
      labels:
        app: chat-front2-ui
    spec:
      containers:
        - name: chat-front2-ui
          image: localhost/chat-front2-ui:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ENVOY_BASE_URL
              value: "http://envoy-default-ai-gw-lab-82528b23.envoy-gateway-system.svc.cluster.local:80"
            - name: ENVOY_MODEL
              value: "gpt-5.1"
            - name: IDP_URL
              value: "http://oauth-idp.default.svc.cluster.local:9000"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chat-front2-ui
  namespace: default
spec:
  type: NodePort
  selector:
    app: chat-front2-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30200
      protocol: TCP
