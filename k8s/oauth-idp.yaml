# oauth-idp — Mock OAuth2 IDP (dev/test only — not for production)
# Deployment + ClusterIP Service + NodePort Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-idp
  labels:
    app: oauth-idp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth-idp
  template:
    metadata:
      labels:
        app: oauth-idp
    spec:
      containers:
        - name: oauth-idp
          image: localhost/oauth-idp:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
          env:
            - name: ISSUER
              value: "http://localhost:9000"
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-idp
spec:
  selector:
    app: oauth-idp
  ports:
    - port: 9000
      targetPort: 9000
---
# NodePort for external access (integration tests)
apiVersion: v1
kind: Service
metadata:
  name: oauth-idp-nodeport
spec:
  type: NodePort
  selector:
    app: oauth-idp
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30300
